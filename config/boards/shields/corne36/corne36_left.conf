CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_STUDIO=y

# Turn on mouse key
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_GPIO=y

# +8 dBm
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Go to sleep after 60 mins (5*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_SLEEP=y
# # Go to sleep ONLY AFTER 16 seconds on disconnected to central,
# # central disconnection imply that it just fall asleep.
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=16000
# CONFIG_ZMK_INSOMNIA_PING_ON_START=y
# # set a ping before attempting to sleep AFTER 15 (minus 1 second, 1000ms)
# CONFIG_ZMK_INSOMNIA_PING_INTERVAL=1500

# Clear settings on start
# CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y

# Allow second peripheral (for pairing trackball peripheral)
#  NOTE:
#   #define ZMK_BLE_PROFILE_COUNT (CONFIG_BT_MAX_PAIRED - CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS)
#   #define ZMK_SPLIT_BLE_PERIPHERAL_COUNT CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS
CONFIG_BT_MAX_PAIRED=6
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
CONFIG_ZMK_SPLIT_BLE_PREF_WEAK_BOND=y
CONFIG_ZMK_SPLIT_BLE_PREF_CONTINUOUS_SCAN_WINDOW=12000
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y


# >>> For low latency dongle mode, with 1ms report rate limit, central in EBS-only mode
# >>> BLE is disable and receive ESB packet from peripherals only
# >>> MPSL is enabled with 1 sessions only
# CONFIG_ZMK_BLE=n
# CONFIG_ZMK_SPLIT_BLE=n
# CONFIG_ZMK_SPLIT_WIRED=n
# CONFIG_ZMK_SPLIT_ESB=y
# # CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=0
# CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
# CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
# CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=1536
# CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=1024
# CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=256
# CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# CONFIG_ESB_MAX_PAYLOAD_LENGTH=64
# # CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y


# >>> For hybird mode, with 4ms report rate limit, central in hybird mode
# >>> BLE is enabled as noramal split central and receive ESB packet from peripherals too
# >>> MPSL is enabled with 2 sessions
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
# CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=0
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=2
CONFIG_ZMK_SPLIT_ESB_PROTO_MSGQ_ITEMS=1536
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=1024
CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=256
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ESB_MAX_PAYLOAD_LENGTH=64
# CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y

