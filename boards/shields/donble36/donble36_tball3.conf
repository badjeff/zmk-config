# CONFIG_BOARD_ENABLE_DCDC_HV=n
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Turn on mouse key
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_GPIO=y

# PAW3222 Driver
CONFIG_PINCTRL=y
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_INPUT_LOG_LEVEL_DBG=y

# +8 dBm
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Go to sleep after 30 mins (30*60*1000ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_SLEEP=y
# Go to sleep ONLY AFTER 16 seconds on disconnected to central,
# central disconnection imply that it just fall asleep.
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=16000
# CONFIG_ZMK_INSOMNIA_PING_ON_START=y
# # set a ping before attempting to sleep AFTER 15 (minus 1 second, 1000ms)
# CONFIG_ZMK_INSOMNIA_PING_INTERVAL=15000

# Clear settings on start
# CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=y

# Allow second peripheral (for pairing trackball peripheral)
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SPLIT_BLE_PREF_WEAK_BOND=y
# CONFIG_ZMK_SPLIT_BLE_PREF_CONTINUOUS_SCAN_WINDOW=30000
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# # for battery reporting
# CONFIG_ZMK_BATTERY_REPORTING=y

# CONFIG_ZMK_BLE=n
# CONFIG_ZMK_SPLIT_BLE=n
# CONFIG_ZMK_SPLIT_WIRED=n
# CONFIG_ZMK_SPLIT_ESB=y
# CONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=24
# CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
# CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
# CONFIG_ESB_TX_FIFO_SIZE=1
# # CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y

CONFIG_BT_CTLR_ADVANCED_FEATURES=y  
CONFIG_BT_CTLR_CONN_INTERVAL_LOW_LATENCY=y  
CONFIG_BT_CONN_PARAM_ANY=y  
CONFIG_BT_CTLR_ASSERT_OVERHEAD_START=n  
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=1  
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=1  
CONFIG_BT_PERIPHERAL_PREF_LATENCY=100  
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y  
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=1000
